<div class="viewer-layout">
  <div class="viewer-sidebar">
    <h2 class="section-title">COMANDOS</h2>
    <div class="command-list">
      <div class="command-item">> ARRASTRAR: GIRAR</div>
      <div class="command-item">> RUEDA: ZOOM</div>
      <div class="command-item">> CLICK_DER: DESPLAZAR</div>
    </div>

    <div class="environment-section">
      <h2 class="section-title">ILUMINACIÓN</h2>
      <div class="env-grid">
        <button
          *ngFor="let env of environments"
          class="env-btn"
          [class.active]="selectedEnv === env.id"
          (click)="updateEnvironment(env.id)"
        >
          {{ env.name }}
        </button>
      </div>
    </div>

    <div class="info-box">
      <p class="info-text">SISTEMA LISTO.</p>
    </div>
  </div>

  <div class="viewer-main">
    <app-wheelchair-project-viewer></app-wheelchair-project-viewer>
  </div>
</div>
