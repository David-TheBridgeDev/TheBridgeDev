<div class="chordsBtn">
  @for (chordName of scaleBtn; track chordName){
  <button
    mat-button
    color="primary"
    matTooltip="{{
      !!chordName.description ? chordName.description : chordName.name
    }}"
    (click)="selectChordScale(chordName.name)"
    [class.active]="scaleSelected === chordName.name"
  >
    {{ chordName.name }}
  </button>
  }
</div>

<div class="nav-controls">
  <button
    class="btn-previews-chord"
    mat-fab
    color="primary"
    matTooltip="Previews chord"
    (click)="incrementOffset(+1)"
  >
    <mat-icon>keyboard_arrow_left</mat-icon>
  </button>
  <button
    class="btn-next-chord"
    mat-fab
    color="primary"
    matTooltip="Next chord"
    (click)="incrementOffset(-1)"
  >
    <mat-icon>keyboard_arrow_right</mat-icon>
  </button>
</div>

<div class="fretboard-container">
  <app-fretboard [scale]="scale"></app-fretboard>
</div>
