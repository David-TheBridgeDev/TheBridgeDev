<ngx-colors
  *ngIf="show"
  ngx-colors-trigger
  [format]="ColorPickerConfig.format"
  [palette]="ColorPickerConfig.palette"
  [colorPickerControls]="ColorPickerConfig.colorPickerControls"
  [acceptLabel]="ColorPickerConfig.acceptLabel"
  [cancelLabel]="ColorPickerConfig.cancelLabel"
  [hideColorPicker]="false"
  [hideTextInput]="false"
  [formControl]="formControl"
  (change)="formControlChange($event)"
></ngx-colors>
