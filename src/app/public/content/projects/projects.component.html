<aside id="tab_header" class="tab_header">
  <span class="TagSelector" tag="projects">Projects</span>
</aside>
<div id="container_projects" class="tabElement">
  <h2 class="portfolio_text">
    Project Portfolio
    <svg
      xmlns="http://www.w3.org/2000/svg"
      id="move-tool"
      style="
        padding-left: 0.2em;
        height: 32px;
        position: relative;
        top: 9px;
      "
      stroke-width="2"
      stroke="#efbc21"
      fill="none"
      viewBox="0 0 24 24"
      stroke-linecap="round"
      stroke-linejoin="round"
    >
      <path stroke="none" d="M0 0h24v24H0z" fill="none"></path>
      <path d="M3 21h4l13 -13a1.5 1.5 0 0 0 -4 -4l-13 13v4"></path>
      <line x1="14.5" y1="5.5" x2="18.5" y2="9.5"></line>
      <polyline points="12 8 7 3 3 7 8 12"></polyline>
      <line x1="7" y1="8" x2="5.5" y2="9.5"></line>
      <polyline points="16 12 21 17 17 21 12 16"></polyline>
      <line x1="16" y1="17" x2="14.5" y2="18.5"></line>
    </svg>
  </h2>

  <div class="graphics_ides ides_container container_projects_icons">
    <div
      matTooltip="Home Automation"
      class="grid-element"
      style="
        background-image: url(&quot;assets/images/png/others/domotic.png&quot;);
        cursor: pointer;
      "
      [routerLink]="['/', AppRoutes.PROJECTS, AppRoutes.HOME_AUTOMATION]"
    ></div>

    <div
      matTooltip="Music"
      class="grid-element"
      style="
        background-image: url(&quot;assets/images/png/others/music.png&quot;);
        cursor: pointer;
      "
      [routerLink]="['/', AppRoutes.PROJECTS, AppRoutes.MUSIC]"
    ></div>
  </div>
</div>
